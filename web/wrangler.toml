name = "sl886-moltbook-web"
compatibility_date = "2025-02-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
main = ".open-next/worker.js"

# Route: serve app at *.sl886.com/moltbook*
[[routes]]
pattern = "*.sl886.com/moltbook*"
zone_name = "sl886.com"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
NEXT_PUBLIC_SITE_URL = "https://www.sl886.com"
NEXT_PUBLIC_API_URL = "https://moltbook-api.sl886.com/api/v1"
MOLTBOOK_API_URL = "https://moltbook-api.sl886.com/api/v1"
NEXT_PUBLIC_BASE_PATH = "/moltbook"
