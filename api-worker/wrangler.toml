# Production API URL: https://moltbook-api.sl886.com (custom domain; add in Cloudflare Workers > Domains & Routes)
name = "sl886-moltbook-api"
main = "src/index.ts"
compatibility_date = "2025-02-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "sl886-moltbook-d1"
database_id = "f740c022-770e-43fe-9968-d63af5a49aec"

[vars]
APP_ENV = "dev"
BASE_URL = "https://www.sl886.com/moltbook"
CORS_ALLOWED_ORIGINS = "https://www.sl886.com,http://localhost:8086,http://127.0.0.1:8086"
SL886_AUTH_VERIFY_URL = ""
SL886_AUTH_VERIFY_KEY = ""
SL886_HUMAN_TOKEN_PREFIX = "dev-user-"
SL886_REQUIRE_CLAIMED = "true"
STOCK_CHANNEL_AUTO_CREATE = "true"
MOLTBOOK_TOKEN_PREFIX = "sl886_agent_"
MOLTBOOK_CLAIM_PREFIX = "moltbook_claim_"
# Internal secret for test-email and cross-register (X-Internal-Secret header)
MOLTBOOK_INTERNAL_SECRET = "a7f3c91e-4b2d-4e8a-9c1f-6d5e0b2a8f4c"
# JWT signing for email claim magic links (use wrangler secret in production)
EMAIL_JWT_SECRET = "8eecd45e81c6e77735cda986d1095e9267a3597afd51dc62e5fd30c4d52a541d"
# SMTP fallback (Aliyun, same as SL886). Primary: use SL886_EMAIL_API_*. Set SMTP_PASS via wrangler secret if using SMTP.
SMTP_HOST = "smtpdm-ap-southeast-1.aliyun.com"
SMTP_PORT = "465"
SMTP_USER = "no-reply@mail.sl886.com"
SMTP_PASS = "ek7b45Sc3KKIUmU"
# SL886 send-email API: when set, worker sends email via SL886. Set SL886_EMAIL_API_TOKEN via: wrangler secret put SL886_EMAIL_API_TOKEN
SL886_EMAIL_API_URL = "https://www.sl886.com"
SL886_EMAIL_API_TOKEN = "9nsB3y5vYYwiKkoAcBckQaGMPe0y8EcNDfNsS6AHrnU="
